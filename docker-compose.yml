version: '3.8'
services:
  api:
    build: .
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./models:/app/models
      - ./data:/app/data

  dashboard:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    command: streamlit run src/dashboard.py
    depends_on:
      - api
